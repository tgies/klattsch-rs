# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "0BSD",
    "ISC",
    "Unlicense",
    "Zlib",
    "MIT-0",
    "CC0-1.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[licenses.private]
# Workspace crates aren't published; skip license checks on them
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
